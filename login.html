<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Airline Login</title>
		<link rel="stylesheet" href="style.css" />
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
	</head>
	<body class="login-page">
		<main class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
			<div class="row g-4 align-items-stretch login-shell">
				<div class="col-lg-6">
					<div class="login-panel h-100">
						<div class="login-brand">
							<span class="brand-icon" aria-hidden="true">
								<svg
									xmlns="http://www.w3.org/2000/svg"
									width="28"
									height="28"
									viewBox="0 0 24 24"
									fill="none"
									stroke="currentColor"
									stroke-width="2"
									stroke-linecap="round"
									stroke-linejoin="round"
								>
									<path d="M2 16l20-5-20-5 4 5-4 5z" />
									<path d="M10 12h8" />
								</svg>
							</span>
							<div>
								<h1 class="h3 mb-2">Airline System</h1>
								<p class="mb-0 text-white-50">
									Secure login portal for airline operations and passenger services.
								</p>
							</div>
						</div>
		
					</div>
				</div>

				<div class="col-lg-6">
					<div class="card login-card border-0 h-100">
						<div class="card-body p-4 p-lg-5">
							<div class="login-tabs mb-4">
								<button class="tab-btn active" type="button" data-target="user">
									User Login
								</button>
								<button class="tab-btn" type="button" data-target="admin">
									Admin Login
								</button>
							</div>

							<div id="userForm" class="login-form">
								<form id="userLoginForm">
									<div class="mb-3">
										<label class="form-label" for="userEmail">Username/Gmail</label>
										<input
											class="form-control login-input"
											type="text"
											id="userEmail"
											placeholder="you@gmail.com"
											required
										/>
									</div>
									<div class="mb-2">
										<label class="form-label" for="userPassword">Password</label>
										<input
											class="form-control login-input"
											type="password"
											id="userPassword"
											placeholder="Enter your password"
											required
										/>
									</div>
									<div class="mb-3">
										<a class="small text-decoration-none" href="#" id="showRegister">
											New User? Register
										</a>
									</div>
									<button class="btn btn-primary w-100 login-btn" type="submit">
										Login
									</button>
								</form>

								<form id="userRegisterForm" style="display: none;">
									<div class="mb-3">
										<label class="form-label" for="regUsername">Username</label>
										<input
											class="form-control login-input"
											type="text"
											id="regUsername"
											placeholder="Choose a username"
											required
										/>
									</div>
									<div class="mb-3">
										<label class="form-label" for="regEmail">Gmail</label>
										<input
											class="form-control login-input"
											type="email"
											id="regEmail"
											placeholder="you@gmail.com"
											required
										/>
									</div>
									<div class="mb-3">
										<label class="form-label" for="regPassword">Password</label>
										<input
											class="form-control login-input"
											type="password"
											id="regPassword"
											placeholder="Create a password"
											required
										/>
									</div>
									<div class="mb-3">
										<label class="form-label" for="regConfirm">Confirm Password</label>
										<input
											class="form-control login-input"
											type="password"
											id="regConfirm"
											placeholder="Confirm your password"
											required
										/>
									</div>
									<button class="btn btn-outline-primary w-100 register-btn mb-3" type="submit">
										Register
									</button>
									<a class="small text-decoration-none" href="#" id="showLogin">
										Already have account? Login
									</a>
								</form>
							</div>

							<form id="adminForm" class="login-form d-none">
								<div class="mb-3">
									<label class="form-label" for="adminId">Admin ID</label>
									<input
										class="form-control login-input"
										type="text"
										id="adminId"
										placeholder="Enter admin ID"
										required
									/>
								</div>
								<div class="mb-4">
									<label class="form-label" for="adminPassword">Password</label>
									<input
										class="form-control login-input"
										type="password"
										id="adminPassword"
										placeholder="Enter your password"
										required
									/>
								</div>
								<button class="btn btn-primary w-100 login-btn" type="submit">
									Login
								</button>
							</form>
							<!-- <p class="text-muted small mt-4 mb-0">
								Secure access for authorized airline staff.
							</p> -->
						</div>
					</div>
				</div>
			</div>
		</main>

		<script>
			const tabButtons = document.querySelectorAll(".tab-btn");
			const userForm = document.getElementById("userForm");
			const adminForm = document.getElementById("adminForm");
			const userLoginForm = document.getElementById("userLoginForm");
			const userRegisterForm = document.getElementById("userRegisterForm");
			const showRegister = document.getElementById("showRegister");
			const showLogin = document.getElementById("showLogin");

			tabButtons.forEach((button) => {
				button.addEventListener("click", () => {
					tabButtons.forEach((item) => item.classList.remove("active"));
					button.classList.add("active");
					const target = button.dataset.target;
					if (target === "admin") {
						adminForm.classList.remove("d-none");
						userForm.classList.add("d-none");
					} else {
						userForm.classList.remove("d-none");
						adminForm.classList.add("d-none");
						userLoginForm.style.display = "block";
						userRegisterForm.style.display = "none";
					}
				});
			});

			showRegister.addEventListener("click", (event) => {
				event.preventDefault();
				userLoginForm.style.display = "none";
				userRegisterForm.style.display = "block";
			});

			showLogin.addEventListener("click", (event) => {
				event.preventDefault();
				userRegisterForm.style.display = "none";
				userLoginForm.style.display = "block";
			});

			userLoginForm.addEventListener("submit", (event) => {
				event.preventDefault();
				window.location.href = "user-dashboard.html";
			});

			userRegisterForm.addEventListener("submit", (event) => {
				event.preventDefault();
				window.location.href = "user-dashboard.html";
			});

			adminForm.addEventListener("submit", (event) => {
				event.preventDefault();
				window.location.href = "admin-dashboard.html";
			});
		</script>
	</body>
</html>
>
