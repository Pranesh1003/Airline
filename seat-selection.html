<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Seat Availability & Selection</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
		<style>
			:root {
				--airline-blue: #0d6efd;
				--seat-available: #28a745;
				--seat-booked: #dc3545;
				--seat-selected: #0d6efd;
			}

			body {
				background: #f4f7fb;
			}

			.page-header {
				background: linear-gradient(90deg, #0d6efd 0%, #3b82f6 100%);
				color: #fff;
			}

			.seat-grid {
				display: grid;
				grid-template-columns: repeat(4, minmax(56px, 1fr));
				gap: 12px;
			}

			.seat-btn {
				border: none;
				color: #fff;
				font-weight: 600;
				padding: 10px 0;
				border-radius: 8px;
			}

			.seat-available {
				background: var(--seat-available);
			}

			.seat-booked {
				background: var(--seat-booked);
			}

			.seat-selected {
				background: var(--seat-selected);
			}

			.legend-dot {
				width: 14px;
				height: 14px;
				border-radius: 50%;
				display: inline-block;
				margin-right: 8px;
			}

			.card-title {
				color: var(--airline-blue);
			}
		</style>
	</head>
	<body>
		<header class="page-header py-4 mb-4">
			<div class="container">
				<div class="d-flex align-items-center gap-3">
					<span class="bg-white bg-opacity-25 rounded-circle p-2">
						<svg
							xmlns="http://www.w3.org/2000/svg"
							width="24"
							height="24"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
							aria-hidden="true"
						>
							<path d="M2 16l20-5-20-5 4 5-4 5z" />
							<path d="M10 12h8" />
						</svg>
					</span>
					<div>
						<h1 class="h3 mb-1">Seat Availability & Selection</h1>
						<p class="mb-0 text-white-50">Choose your seat and confirm details</p>
					</div>
				</div>
			</div>
		</header>

		<main class="container pb-5">
			<div class="row g-4">
				<div class="col-lg-7">
					<div class="card border-0 shadow-sm">
						<div class="card-body">
							<h5 class="card-title mb-3">Seat Layout</h5>
							<div class="seat-grid">
								<button class="seat-btn seat-available" type="button">A1</button>
								<button class="seat-btn seat-booked" type="button">A2</button>
								<button class="seat-btn seat-available" type="button">A3</button>
								<button class="seat-btn seat-selected" type="button">A4</button>

								<button class="seat-btn seat-available" type="button">B1</button>
								<button class="seat-btn seat-available" type="button">B2</button>
								<button class="seat-btn seat-booked" type="button">B3</button>
								<button class="seat-btn seat-available" type="button">B4</button>

								<button class="seat-btn seat-available" type="button">C1</button>
								<button class="seat-btn seat-booked" type="button">C2</button>
								<button class="seat-btn seat-available" type="button">C3</button>
								<button class="seat-btn seat-available" type="button">C4</button>
							</div>
						</div>
					</div>

					<div class="card border-0 shadow-sm mt-4">
						<div class="card-body">
							<h5 class="card-title mb-3">Seat Legend</h5>
							<div class="d-flex flex-wrap gap-4">
								<div class="d-flex align-items-center">
									<span class="legend-dot" style="background: var(--seat-available)"></span>
									<span>Available</span>
								</div>
								<div class="d-flex align-items-center">
									<span class="legend-dot" style="background: var(--seat-booked)"></span>
									<span>Booked</span>
								</div>
								<div class="d-flex align-items-center">
									<span class="legend-dot" style="background: var(--seat-selected)"></span>
									<span>Selected</span>
								</div>
							</div>
						</div>
					</div>
				</div>

				<div class="col-lg-5">
					<div class="card border-0 shadow-sm">
						<div class="card-body">
							<h5 class="card-title mb-3">Passenger Seat Selection</h5>
							<form>
								<div class="mb-3">
									<label class="form-label" for="passengerName">Passenger Name</label>
									<input
										class="form-control"
										type="text"
										id="passengerName"
										placeholder="Enter passenger name"
									/>
								</div>
								<div class="mb-3">
									<label class="form-label" for="seatNumber">Seat Number</label>
									<input
										class="form-control"
										type="text"
										id="seatNumber"
										placeholder="e.g., A3"
									/>
								</div>
								<button class="btn btn-primary w-100" type="submit">
									Confirm Seat
								</button>
							</form>
						</div>
					</div>

					<div class="card border-0 shadow-sm mt-4">
						<div class="card-body">
							<h5 class="card-title mb-3">Seat Summary</h5>
							<div class="d-flex justify-content-between mb-2">
								<span>Total Seats</span>
								<strong>12</strong>
							</div>
							<div class="d-flex justify-content-between mb-2">
								<span>Available Seats</span>
								<strong>8</strong>
							</div>
							<div class="d-flex justify-content-between">
								<span>Booked Seats</span>
								<strong>4</strong>
							</div>
						</div>
					</div>
				</div>
			</div>
		</main>
	</body>
</html>
